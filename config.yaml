general:
    log_level: debug
    show_preview: false
    cooldown_seconds: 30
    stats_file: ~/.local/share/nailbite/stats.jsonl

models:
    palm_detection: ./models/palm_detection.onnx
    hand_landmark: ./models/hand_landmark.onnx
    # Higher-quality RTMPose-m hand landmarker (256x256 SimCC, trained on
    # COCO-WholeBody-Hand + OneHand10K + FreiHand + RHD + HALPE). Replaces
    # the lite model at runtime when present and loadable; the lite model
    # remains the automatic fallback. Runs on CPU, CUDA, ROCm, MIGraphX.
    hand_landmark_full: ./models/hand_landmark_full.onnx
    # Quality preference for hand landmarking:
    #   auto - use the full model if available, lite otherwise
    #   lite - always use MediaPipe lite (default; emits handedness)
    #   full - require the full model (errors out if unavailable)
    #
    # Lite is the default because the RTMPose-m full model is more
    # precise per-keypoint but doesn't emit handedness, which leaves
    # the tracker dependent on pose-wrist matching to decide left/right
    # — and pose visibility is unstable enough in real-world lighting
    # that hand identity flickers. The lite model bakes handedness
    # into its output, which is the more important signal for BFRB
    # tracking. Switch to `full` if you have a clean desk shot with
    # both wrists clearly visible and want sub-pixel landmark accuracy.
    hand_landmark_quality: lite
    face_detection: ./models/face_detection.onnx
    face_mesh: ./models/face_mesh.onnx
    pose_landmark: ./models/pose_landmark.onnx

# Camera config for V4L2 capture
# Multiple cameras can be configured; exactly one must be primary
camera:
    inference_fps: 8
    # Preview FPS — frame rate of the live camera display. Independent of
    # inference. Higher = smoother preview, more bandwidth between Rust and the
    # webview. Must be >= inference_fps.
    preview_fps: 24
    # Camera biasing applied at capture start. Each field maps to a
    # V4L2 control and is best-effort: unsupported controls on a
    # given camera are skipped, not fatal. Defaults are tuned to be
    # MINIMAL — just enable the camera's own auto-features and reset
    # gamma to driver default. The "lift biases" (max backlight
    # compensation, brightness/contrast pushes) are opt-in because on
    # normally-lit scenes they over-expose the image.
    controls:
        # Reset gamma to driver default. Other apps (browsers,
        # conferencing tools) often leave gamma jacked up; without
        # this the image arrives over-bright and auto-exposure can't
        # recover. Leave on unless you have a specific reason.
        gamma_reset: true
        # Auto-exposure ON so the camera tracks room brightness.
        auto_exposure: true
        # Image priority ON — exposure may extend in dim or backlit
        # scenes (FPS may drop briefly). When false, V4L2 caps
        # exposure to preserve FPS and the subject ends up dark.
        exposure_auto_priority: true
        auto_white_balance: true
        auto_gain: true
        # Opt-in lift for genuinely backlit scenes (bright window
        # behind the subject). Off by default because it over-exposes
        # on normally-lit scenes.
        backlight_compensation_max: false
        # Manual brightness / contrast bias as a fraction of the
        # control's [min, max] range, rounded to the nearest step.
        # null (default) leaves the camera's own default — the right
        # choice unless you've measured a specific problem.
        brightness_fraction: null
        contrast_fraction: null
    sources:
        - id: main
          device: /dev/video0
          role: primary
          resolution_width: 640
          resolution_height: 480
        # Example: add secondary camera
        # - id: secondary
        #   device: /dev/video2
        #   role: auxiliary
        #   resolution_width: 640
        #   resolution_height: 480

ort:
    # 8 intra-op threads × 6 ONNX sessions × 8 inference fps gives the
    # CPU EP a heavy duty cycle — easily 13+ cores under load — even
    # though only one session is active at a time. Dropping to 3 trades
    # ~1.5× longer per-frame inference for ~4× lower CPU load, which is
    # a much better tradeoff while the GPU EP isn't wired up.
    intra_op_num_threads: 3
    inter_op_num_threads: 2
    gpu:
        # auto: try GPU, fall back to CPU
        # disabled: CPU only
        # required: fail if no GPU available
        preference: auto
        # auto: try TensorRT > CUDA > MIGraphX > ROCm
        # cuda: NVIDIA CUDA only
        # tensorrt: NVIDIA TensorRT (falls back to CUDA)
        # migraphx: AMD MIGraphX only
        backend: auto
        # GPU device index (0-7)
        device_id: 0
        # Enable FP16 for supported backends
        fp16_enable: true
        # Optional memory limit in MB (uncomment to use)
        # memory_limit_mb: 2048

detection:
    behaviors:
        nail_biting:
            enabled: true
            proximity_threshold: 0.35
            # 1 s of sustained mouth-contact. Anything longer kept
            # blowing past real bites (which are often a brief
            # chew-and-retract). The temporal tracker's positive_ratio
            # (config below) still filters single-frame flickers, and
            # the per-detector suppressions (typing posture, gripping
            # an object, chin rest) handle the obvious false positives.
            min_sustained_ms: 1000
            confidence_threshold: 0.3
        nail_picking:
            enabled: true
            # Picking sits at the same dwell budget as biting; both
            # are deliberate gestures and 1 s is enough to distinguish
            # them from passing hand contact while still catching real
            # episodes.
            proximity_threshold: 0.18
            min_sustained_ms: 1000
            confidence_threshold: 0.5
        hair_pulling:
            enabled: false
        skin_picking:
            enabled: false
        lip_biting:
            enabled: false
    temporal:
        window_ms: 1500
        positive_ratio: 0.4
    false_positive:
        typing_suppression: true
        chin_rest_suppression: true
        eating_suppression: true
    # Hand tracking stability parameters
    tracking:
        # Frames a hand persists without detection before disappearing (grace period)
        grace_frames: 3
        # Consecutive detection frames required before a new hand becomes visible
        confirmation_frames: 2
        # EMA smoothing factor for landmarks (1=use new sample as-is, 0=never update).
        # With the rotation-normalised crop in place the model's per-frame
        # output is genuinely stable, so we keep this responsive (closer
        # to 1.0 = less lag). Push down toward 0.5 if landmarks visibly
        # jitter — but usually that means the crop is wrong, not the
        # smoother.
        smoothing_alpha: 0.7
        # Confidence threshold for accepting a new hand (higher = fewer false positives)
        new_hand_confidence: 0.30
        # Confidence threshold for keeping an existing hand (lower = more stable)
        existing_hand_confidence: 0.15

fusion:
    strategy: any
    merge_tolerance_ms: 100

actions:
    sound:
        enabled: true
        file: builtin
        volume: 0.8
        repeat: true
    webhook:
        enabled: false
        url: ""
        timeout_ms: 5000

hotkeys:
    dismiss_false_positive: F9
    mark_missed_event: F10
    pause_resume: F11

history:
    enabled: true
    dir: ~/.local/share/nailbite/history
    frames_before: 5
    frames_after: 5
    annotate_landmarks: true
    max_events: 100
