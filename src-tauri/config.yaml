general:
  log_level: info
  show_preview: false
  cooldown_seconds: 30
  stats_file: ~/.local/share/nailbite/stats.jsonl
  show_detection_count: true
models:
  palm_detection: ./models/palm_detection.onnx
  hand_landmark: ./models/hand_landmark.onnx
  hand_landmark_full: ./models/hand_landmark_full.onnx
  hand_landmark_quality: auto
  face_detection: ./models/face_detection.onnx
  face_mesh: ./models/face_mesh.onnx
  pose_landmark: ./models/pose_landmark.onnx
camera:
  sources:
  - id: main
    device: /dev/video0
    role: primary
    resolution_width: 640
    resolution_height: 480
  inference_fps: 8
  preview_fps: 24
ort:
  intra_op_num_threads: 2
  inter_op_num_threads: 1
  gpu:
    preference: auto
    backend: auto
    device_id: 0
    fp16_enable: true
    memory_limit_mb: null
detection:
  behaviors:
    nail_biting:
      enabled: true
      proximity_threshold: 0.35
      min_sustained_ms: 1500
      confidence_threshold: 0.3
    nail_picking:
      enabled: true
      proximity_threshold: 0.15
      min_sustained_ms: 1500
      confidence_threshold: 0.3
    hair_pulling:
      enabled: false
      proximity_threshold: 0.35
      min_sustained_ms: 1500
      confidence_threshold: 0.3
    skin_picking:
      enabled: false
      proximity_threshold: 0.35
      min_sustained_ms: 1500
      confidence_threshold: 0.3
    lip_biting:
      enabled: false
      proximity_threshold: 0.35
      min_sustained_ms: 1500
      confidence_threshold: 0.3
  temporal:
    window_ms: 1500
    positive_ratio: 0.5
  false_positive:
    typing_suppression: true
    chin_rest_suppression: true
    eating_suppression: true
  tracking:
    grace_frames: 3
    confirmation_frames: 2
    smoothing_alpha: 0.3
    new_hand_confidence: 0.3
    existing_hand_confidence: 0.15
fusion:
  strategy: any
  merge_tolerance_ms: 100
actions:
  sound:
    enabled: true
    file: builtin
    volume: 0.8
    repeat: true
  webhook:
    enabled: false
    url: ''
    timeout_ms: 5000
    headers: {}
  visual:
    enabled: true
  notification:
    enabled: true
    timeout_ms: 20000
exercises:
  selection_strategy: random
  preferred_exercise: null
  hold_duration_override: null
  reps_override: null
  timeout_seconds: 120
  compliance_ratio: 0.8
hotkeys:
  dismiss_false_positive: F9
  mark_missed_event: F10
  pause_resume: F11
training:
  save_frames: false
  save_landmarks: true
  annotations_file: ~/.local/share/nailbite/annotations.jsonl
  frames_dir: ~/.local/share/nailbite/frames/
history:
  enabled: true
  dir: ~/.local/share/nailbite/history
  frames_before: 5
  frames_after: 5
  annotate_landmarks: true
  max_events: 100
