name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  # Pin versions for reproducible builds
  NODE_VERSION: "22"
  PNPM_VERSION: "10"

jobs:
  # Frontend checks (TypeScript, ESLint, Vitest)
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: TypeScript check
        run: pnpm exec tsc --noEmit

      - name: Build frontend
        run: pnpm build

      - name: Run tests
        run: pnpm test

  # Backend checks (Rust in src-tauri/)
  backend:
    name: Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        env:
          # Pin WebKitGTK to 2.44.0-2 to match Docker build and avoid EGL regression
          WEBKIT_VERSION: "2.44.0-2"
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            pkg-config \
            cmake \
            clang \
            libclang-dev \
            libwebkit2gtk-4.1-0=${WEBKIT_VERSION} \
            libwebkit2gtk-4.1-dev=${WEBKIT_VERSION} \
            libjavascriptcoregtk-4.1-0=${WEBKIT_VERSION} \
            libjavascriptcoregtk-4.1-dev=${WEBKIT_VERSION} \
            gir1.2-javascriptcoregtk-4.1=${WEBKIT_VERSION} \
            gir1.2-webkit2-4.1=${WEBKIT_VERSION} \
            libgtk-3-dev \
            libglib2.0-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            libasound2-dev \
            libwayland-dev \
            libxkbcommon-dev \
            libx11-dev \
            libxcursor-dev \
            libxrandr-dev \
            libxi-dev \
            libxcb1-dev \
            libgl-dev \
            libvulkan-dev \
            libxdo-dev \
            libv4l-dev \
            linux-libc-dev \
            libssl-dev

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Check
        working-directory: src-tauri
        run: cargo check --all-targets

      - name: Clippy
        working-directory: src-tauri
        run: cargo clippy --all-targets -- -D warnings

      - name: Test
        working-directory: src-tauri
        run: cargo test

  # Security audits
  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Rust audit
      - uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          working-directory: src-tauri

      # Frontend audit (DEVOPS-16)
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: pnpm audit
        run: pnpm audit --audit-level=high

  # Docker build (produces artifacts)
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [frontend, backend]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build with build.sh
        env:
          GPU_BACKEND: none
          BUILD_MODE: dev
          BUILDX_CACHE: gha
          OUTPUT_DIR: ./dist
        run: bash build.sh

      - name: Verify binary
        run: |
          if [ -f ./dist/nailbite ]; then
            file ./dist/nailbite
            sha256sum ./dist/nailbite
          fi
          if [ -d ./dist/bundle ]; then
            find ./dist/bundle -type f \( -name "*.AppImage" -o -name "*.deb" \) -exec ls -lh {} \;
          fi

      # Upload artifacts on tags and main branch
      - name: Upload artifacts
        if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: nailbite-linux-x86_64
          path: |
            ./dist/nailbite
            ./dist/bundle/**/*.AppImage
            ./dist/bundle/**/*.deb
          if-no-files-found: warn
